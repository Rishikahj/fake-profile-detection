<!DOCTYPE html>

<html>
<head>
<title>Fake Profile Detection</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:35px;
border-radius:12px;
width:420px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:25px;
}

label{
font-weight:bold;
}

input{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#4facfe;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2f80ed;
}

</style>

</head>

<body>

<div class="container">

<h2>Fake Profile Detection</h2>

<form action="/predict" method="post">

<label>Followers</label> <input type="number" name="followers" required>

<label>Following</label> <input type="number" name="following" required>

<label>Posts</label> <input type="number" name="posts" required>

<label>Bio Length</label> <input type="number" name="bio_length" required>

<label>Profile Picture (1 = Yes, 0 = No)</label> <input type="number" name="profile_picture" required>

<label>Username Length</label> <input type="number" name="username_length" required>

<button type="submit">Detect Profile</button>

</form>

</div>

</body>
</html>
